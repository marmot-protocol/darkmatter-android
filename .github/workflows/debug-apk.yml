name: Build debug APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: debug-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_COMPILE_SDK: "37.0"
  ANDROID_BUILD_TOOLS: "37.0.0"
  DEBUG_APK_NAME: darkmatter-latest-main-debug.apk

jobs:
  build-debug-apk:
    name: Build and publish debug APK
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install pinned Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Restore stable debug signing key
        env:
          DARKMATTER_DEBUG_KEYSTORE_BASE64: ${{ secrets.DARKMATTER_DEBUG_KEYSTORE_BASE64 }}
          DARKMATTER_DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DARKMATTER_DEBUG_KEYSTORE_PASSWORD }}
          DARKMATTER_DEBUG_KEY_ALIAS: ${{ secrets.DARKMATTER_DEBUG_KEY_ALIAS }}
          DARKMATTER_DEBUG_KEY_PASSWORD: ${{ secrets.DARKMATTER_DEBUG_KEY_PASSWORD }}
        run: |
          missing=0
          for name in \
            DARKMATTER_DEBUG_KEYSTORE_BASE64 \
            DARKMATTER_DEBUG_KEYSTORE_PASSWORD \
            DARKMATTER_DEBUG_KEY_ALIAS \
            DARKMATTER_DEBUG_KEY_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing debug signing secret::$name is required for reproducible debug APK updates."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          keystore="$RUNNER_TEMP/darkmatter-ci-debug.keystore"
          printf '%s' "$DARKMATTER_DEBUG_KEYSTORE_BASE64" | base64 --decode >"$keystore"
          {
            echo "DARKMATTER_DEBUG_KEYSTORE_PATH=$keystore"
            echo "DARKMATTER_DEBUG_KEYSTORE_PASSWORD=$DARKMATTER_DEBUG_KEYSTORE_PASSWORD"
            echo "DARKMATTER_DEBUG_KEY_ALIAS=$DARKMATTER_DEBUG_KEY_ALIAS"
            echo "DARKMATTER_DEBUG_KEY_PASSWORD=$DARKMATTER_DEBUG_KEY_PASSWORD"
          } >>"$GITHUB_ENV"

      - name: Set monotonic debug version
        run: |
          version_code="$(git rev-list --count HEAD)"
          short_sha="$(git rev-parse --short=7 HEAD)"
          branch_slug="$(printf '%s' "$GITHUB_REF_NAME" | tr -c 'A-Za-z0-9._-' '-')"
          {
            echo "DARKMATTER_VERSION_CODE=$version_code"
            echo "DARKMATTER_VERSION_NAME=${branch_slug}-${short_sha}"
          } >>"$GITHUB_ENV"

      - name: Build debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Collect debug APK artifacts
        run: |
          mkdir -p build/debug-apk
          cp app/build/outputs/apk/debug/*.apk build/debug-apk/
          cp app/build/outputs/apk/debug/app-universal-debug.apk "build/debug-apk/${DEBUG_APK_NAME}"
          (
            cd build/debug-apk
            sha256sum *.apk >SHA256SUMS
          )

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: darkmatter-debug-apk-${{ github.run_number }}
          path: |
            build/debug-apk/*.apk
            build/debug-apk/SHA256SUMS
          retention-days: 60
          if-no-files-found: error

      - name: Publish rolling latest-main release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat >"$RUNNER_TEMP/release-notes.md" <<EOF
          Rolling debug APK built from ${GITHUB_REPOSITORY}@${GITHUB_SHA}.

          - Branch: ${GITHUB_REF_NAME}
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - Application ID: dev.ipf.darkmatter.debug
          - Version code: ${DARKMATTER_VERSION_CODE}
          - Version name: ${DARKMATTER_VERSION_NAME}-debug

          This is for internal QA only. It is not a release-signing path.
          EOF

          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/latest-main" >/dev/null 2>&1; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/git/refs/tags/latest-main" \
              -f sha="$GITHUB_SHA" \
              -F force=true >/dev/null
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/latest-main" \
              -f sha="$GITHUB_SHA" >/dev/null
          fi

          if gh release view latest-main >/dev/null 2>&1; then
            gh release edit latest-main \
              --title "Latest main debug APK" \
              --notes-file "$RUNNER_TEMP/release-notes.md" \
              --prerelease
          else
            gh release create latest-main \
              --title "Latest main debug APK" \
              --notes-file "$RUNNER_TEMP/release-notes.md" \
              --prerelease \
              --target "$GITHUB_SHA"
          fi

          gh release upload latest-main \
            "build/debug-apk/${DEBUG_APK_NAME}" \
            build/debug-apk/SHA256SUMS \
            --clobber
